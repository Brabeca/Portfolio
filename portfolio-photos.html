    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
        color: var(--text-light);
        min-height: 100vh;
    }

    .font-serif { font-family: 'Playfair Display', serif; }

    /* Navigation */
    .nav-container {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        backdrop-filter: blur(20px);
        background: rgba(15, 23, 42, 0.9);
        border-bottom: 1px solid rgba(212, 175, 55, 0.1);
    }

    .nav-link {
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.3s;
        padding: 0.5rem 0;
        position: relative;
    }

    .nav-link:hover, .nav-link.active { color: var(--accent-gold); }

    .nav-link::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: var(--accent-gold);
        transition: width 0.3s;
    }

    .nav-link:hover::after, .nav-link.active::after { width: 100%; }

    /* Page layout */
    .gallery-container {
        padding: 100px 2rem 4rem;
        max-width: 1000px;
        margin: 0 auto;
    }

    .page-title {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        color: var(--accent-gold);
        text-align: center;
        margin-bottom: 0.5rem;
    }

    .page-subtitle {
        text-align: center;
        color: var(--text-muted);
        margin-bottom: 3rem;
    }

    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--accent-gold);
        text-decoration: none;
        margin-bottom: 2rem;
        transition: all 0.3s;
        font-size: 0.95rem;
    }

    .back-btn:hover { transform: translateX(-5px); }

    /* Groupe de photos */
    .photo-group {
        margin-bottom: 3.5rem;
    }

    .group-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.15rem;
        color: var(--accent-gold);
        margin-bottom: 1rem;
        padding-bottom: 0.6rem;
        border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .group-count {
        font-family: 'Inter', sans-serif;
        font-size: 0.8rem;
        color: var(--text-muted);
        font-weight: 400;
    }

    /* Carrousel — UNE photo à la fois */
    .carousel {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(212, 175, 55, 0.15);
        max-width: 500px;
        margin: 0 auto;
    }

    .carousel-track {
        display: flex;
        transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .carousel-slide {
        flex: 0 0 100%;
        aspect-ratio: 3/2;
        max-height: 340px;
        position: relative;
        cursor: pointer;
    }

    .carousel-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .carousel-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid rgba(212, 175, 55, 0.4);
        color: var(--accent-gold);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
        z-index: 10;
    }

    .carousel-nav:hover {
        background: var(--accent-gold);
        color: var(--primary-bg);
    }

    .carousel-prev { left: 12px; }
    .carousel-next { right: 12px; }

    .carousel-counter {
        position: absolute;
        bottom: 12px;
        right: 16px;
        background: rgba(15, 23, 42, 0.8);
        color: var(--text-muted);
        font-size: 0.8rem;
        padding: 3px 10px;
        border-radius: 20px;
        border: 1px solid rgba(212, 175, 55, 0.2);
    }

    /* Photo unique */
    .single-photo {
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid rgba(212, 175, 55, 0.15);
        cursor: pointer;
        transition: border-color 0.3s;
    }

    .single-photo:hover {
        border-color: rgba(212, 175, 55, 0.5);
    }

    .single-photo img {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        display: block;
    }

    /* Dots */
    .carousel-dots {
        display: flex;
        justify-content: center;
        gap: 6px;
        margin-top: 0.75rem;
    }

    .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(212, 175, 55, 0.25);
        cursor: pointer;
        transition: all 0.3s;
        border: none;
    }

    .dot.active {
        background: var(--accent-gold);
        width: 22px;
        border-radius: 4px;
    }

    /* Lightbox */
    .lightbox {
        display: none;
        position: fixed;
        z-index: 2000;
        inset: 0;
        background: rgba(10, 15, 30, 0.97);
        backdrop-filter: blur(12px);
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1rem;
        padding: 4rem 1rem 2rem;
    }

    .lightbox.active { display: flex; }

    .lightbox img {
        max-width: min(88vw, 700px);
        max-height: 65vh;
        width: auto;
        height: auto;
        object-fit: contain;
        border-radius: 8px;
    }

    .lightbox-close {
        position: absolute;
        top: 20px;
        right: 32px;
        color: var(--accent-gold);
        font-size: 36px;
        cursor: pointer;
        line-height: 1;
        background: none;
        border: none;
    }

    .lightbox-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(212, 175, 55, 0.15);
        border: 1px solid rgba(212, 175, 55, 0.4);
        color: var(--accent-gold);
        width: 52px;
        height: 52px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
    }

    .lightbox-btn:hover {
        background: var(--accent-gold);
        color: var(--primary-bg);
    }

    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    .lightbox-caption {
        position: relative;
        bottom: auto;
        left: auto;
        transform: none;
        text-align: center;
        background: rgba(15, 23, 42, 0.9);
        padding: 0.6rem 1.5rem;
        border-radius: 8px;
        border: 1px solid rgba(212, 175, 55, 0.25);
        white-space: nowrap;
    }

    @media (max-width: 640px) {
        .page-title { font-size: 1.75rem; }
        .carousel-nav { width: 36px; height: 36px; font-size: 14px; }
    }
</style>

<div id="lightbox" class="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <button class="lightbox-btn lightbox-prev" onclick="navigateLightbox(-1)">&#10094;</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lightbox-btn lightbox-next" onclick="navigateLightbox(1)">&#10095;</button>
    <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<script>
    const photoGroups = [
        {
            id: "oxfam-equipe",
            title: "Équipe OXFAM QC, Bénin 2025",
            photos: [
                { src: "Images/cb8d4475-297a-40b4-bec9-f43cf5f9f4d0 2.jpg", title: "Équipe OXFAM QC" },
                { src: "Images/cb8d4475-297a-40b4-bec9-f43cf5f9f4d0.jpg", title: "Équipe OXFAM QC" }
            ]
        },
        {
            id: "archives-avant",
            title: "Fonds d'archives OXFAM — Avant traitement",

                { src: "Images/IMG_3405.JPG", title: "Archives avant traitement" }
            ]
        },
        {
            id: "archives-pendant",
            title: "Fonds d'archives OXFAM — Pendant traitement",
            photos: [
                { src: "Images/IMG_5191.jpeg", title: "Archives pendant traitement" },
                { src: "Images/IMG_5190.jpeg", title: "Archives pendant traitement" }
            ]
        },
        {
            id: "archives-apres",
            title: "Fonds d'archives OXFAM — Après traitement",
            photos: [
                { src: "Images/IMG_5235.jpeg", title: "Archives après traitement" },
                { src: "Images/IMG_5228.jpeg", title: "Archives après traitement" }
            ]
        },
        {
            id: "jiv-2024",
            title: "Journée internationale des volontaires, Bénin 2024",
            photos: [
                { src: "Images/IMG_3974.JPG", title: "JIV 2024" },
                { src: "Images/IMG_3969.jpeg", title: "JIV 2024" },
                { src: "Images/IMG_5149.jpeg", title: "JIV 2024" },
                { src: "Images/33216862-6c4b-4826-b117-ed6480399095.jpg", title: "JIV 2024" }
            ]
        },
        {
            id: "sear-2024",
            title: "Suivi-Évaluation des projets (SEAR), OXFAM QC, Bénin 2024–2025",
            photos: [
                { src: "Images/IMG_3501.JPG", title: "SEAR 2024-2025" },
                { src: "Images/IMG_4043.jpeg", title: "SEAR 2024-2025" },
                { src: "Images/IMG_4062.jpeg", title: "SEAR 2024-2025" },
                { src: "Images/IMG_4430.jpeg", title: "SEAR 2024-2025" },
                { src: "Images/IMG_5113.jpeg", title: "SEAR 2024-2025" },
                { src: "Images/IMG_5133.jpeg", title: "SEAR 2024-2025" },
                { src: "Images/IMG_5139.jpeg", title: "SEAR 2024-2025" },
                { src: "Images/58a564c2-f3b2-45c5-968d-30bea96be329.jpeg", title: "SEAR 2024-2025" }
            ]
        },
        {
            id: "ca-suffit",
            title: "Projet Ça Suffit, OXFAM QC, Bénin 2025",
            photos: [
                { src: "Images/f3cadf61-4e6e-4067-a5b4-f35635a4090c.jpg", title: "Projet Ça Suffit" }
            ]
        },
        {
            id: "afromonde-2025",
            title: "Kiosque OXFAM QC, Festival Afro-Monde, Montréal 2025",
            photos: [
                { src: "Images/IMG_6198.jpeg", title: "Festival Afro-Monde" },
                { src: "Images/IMG_6197.jpeg", title: "Festival Afro-Monde" },
                { src: "Images/IMG_6191.jpeg", title: "Festival Afro-Monde" }
            ]
        },
        {
            id: "rail-2025",
            title: "RAIL, Bénin 2025",
            photos: [
                { src: "Images/IMG_5960.jpeg", title: "RAIL Bénin" },
                { src: "Images/IMG_6074.jpeg", title: "RAIL Bénin" }
            ]
        }
    ];

    // Index global pour lightbox
    let allPhotos = [];
    let lightboxIndex = 0;

    // États des carrousels
    const states = {};

    function buildGallery() {
        allPhotos = photoGroups.flatMap(g => g.photos.map(p => ({ ...p, group: g.title })));

        const container = document.getElementById('gallery');
        container.innerHTML = '';

        photoGroups.forEach((group, gi) => {
            const div = document.createElement('div');
            div.className = 'photo-group';

            const globalStart = allPhotos.findIndex(p => p.src === group.photos[0].src);

            if (group.photos.length === 1) {
                div.innerHTML = `
                    <div class="group-title">
                        <span>${group.title}</span>
                    </div>
                    <div class="single-photo" onclick="openLightbox(${globalStart})">
                        <img src="${group.photos[0].src}" alt="${group.photos[0].title}" loading="lazy">
                    </div>
                `;
            } else {
                states[gi] = 0;

                const slides = group.photos.map((p, pi) => `
                    <div class="carousel-slide" onclick="openLightbox(${globalStart + pi})">
                        <img src="${p.src}" alt="${p.title}" loading="lazy">
                    </div>
                `).join('');

                const dots = group.photos.map((_, i) => `
                    <button class="dot ${i === 0 ? 'active' : ''}" onclick="goTo(${gi}, ${i})"></button>
                `).join('');

                div.innerHTML = `
                    <div class="group-title">
                        <span>${group.title}</span>
                        <span class="group-count">${group.photos.length} photos</span>
                    </div>
                    <div class="carousel" id="carousel-${gi}">
                        <div class="carousel-track" id="track-${gi}">${slides}</div>
                        <button class="carousel-nav carousel-prev" onclick="move(${gi}, -1)">&#10094;</button>
                        <button class="carousel-nav carousel-next" onclick="move(${gi}, 1)">&#10095;</button>
                        <div class="carousel-counter" id="counter-${gi}">1 / ${group.photos.length}</div>
                    </div>
                    <div class="carousel-dots" id="dots-${gi}">${dots}</div>
                `;
            }

            container.appendChild(div);
        });
    }

    function move(gi, dir) {
        const total = photoGroups[gi].photos.length;
        states[gi] = (states[gi] + dir + total) % total;
        updateCarousel(gi);
    }

    function goTo(gi, index) {
        states[gi] = index;
        updateCarousel(gi);
    }

    function updateCarousel(gi) {
        const current = states[gi];
        const total = photoGroups[gi].photos.length;
        const track = document.getElementById(`track-${gi}`);
        track.style.transform = `translateX(-${current * 100}%)`;

        document.getElementById(`counter-${gi}`).textContent = `${current + 1} / ${total}`;

        document.querySelectorAll(`#dots-${gi} .dot`).forEach((d, i) => {
            d.classList.toggle('active', i === current);
        });
    }

    // Lightbox
    function openLightbox(index) {
        lightboxIndex = index;
        updateLightbox();
        document.getElementById('lightbox').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('active');
        document.body.style.overflow = '';
    }

    function navigateLightbox(dir) {
        lightboxIndex = (lightboxIndex + dir + allPhotos.length) % allPhotos.length;
        updateLightbox();
    }

    function updateLightbox() {
        const p = allPhotos[lightboxIndex];
        document.getElementById('lightbox-img').src = p.src;
        document.getElementById('lightbox-caption').innerHTML = `
            <div style="color:var(--accent-gold);font-size:0.8rem;margin-bottom:4px">${p.group}</div>
            <strong style="color:var(--text-light)">${p.title}</strong>
        `;
    }

    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') navigateLightbox(-1);
        if (e.key === 'ArrowRight') navigateLightbox(1);
    });

    document.getElementById('lightbox').addEventListener('click', e => {
        if (e.target.id === 'lightbox') closeLightbox();
    });

    buildGallery();
</script>
